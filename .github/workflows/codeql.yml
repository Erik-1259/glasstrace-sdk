name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

# Cancel in-progress scans when a new commit is pushed to the same
# ref. Matches the pattern used in ci.yml. The weekly scheduled scan
# is not affected (it runs on its own cron schedule, not on ref).
concurrency:
  group: codeql-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  analyze:
    name: Code Scanning
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          config-file: ./.github/codeql-config.yml

      - uses: github/codeql-action/analyze@v3
