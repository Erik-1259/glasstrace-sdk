name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: corepack enable

      # Align with the declared packageManager (npm@11.6.1). Node 20/22
      # bundle npm 10.x, and corepack's npm support does not reliably
      # override the bundled version. Without this step, `npm ci` runs
      # under npm 10 while the committed lockfile was produced under
      # npm 11, which produces spurious "out of sync" failures over
      # optional peer deps (e.g. @emnapi/*).
      - name: Upgrade npm to declared version
        run: npm install -g npm@11.6.1

      - run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Pack (verify publishable)
        run: |
          npm pack --dry-run --workspace=packages/protocol
          npm pack --dry-run --workspace=packages/sdk

  browser-import:
    name: Browser import check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: corepack enable

      - name: Upgrade npm to declared version
        run: npm install -g npm@11.6.1

      - run: npm ci

      - run: npm run build

      - name: Verify SDK resolves for browser bundlers
        run: |
          cd /tmp
          mkdir browser-import-test && cd browser-import-test
          npm init -y
          npm install ${{ github.workspace }}/packages/sdk
          # Write a test entry file that imports the SDK's main entry points
          cat > entry.mjs <<'ENTRY'
          import { registerGlasstrace, withGlasstraceConfig, captureError } from "@glasstrace/sdk";
          console.log(typeof registerGlasstrace, typeof withGlasstraceConfig, typeof captureError);
          ENTRY
          # Bundle for browser to verify the SDK's module graph resolves.
          # Node.js built-ins are externalized because the SDK is a server-
          # side package — the goal is verifying the module graph resolves,
          # not eliminating all Node.js references.
          # Both prefixed (node:fs) and unprefixed (fs) forms are needed
          # because tsup strips the node: prefix during bundling.
          npx esbuild --bundle --platform=browser --outfile=out.js \
            --external:@opentelemetry/* \
            --external:'node:*' \
            --external:fs --external:fs/promises --external:path \
            --external:crypto --external:child_process \
            --external:util --external:zlib --external:stream \
            --external:os --external:http --external:https \
            --external:net --external:tls --external:events \
            --external:buffer --external:url --external:querystring \
            --external:async_hooks --external:module \
            entry.mjs
          echo "Browser import check passed"

  compat:
    name: Compatibility (min peer deps)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: corepack enable

      - name: Upgrade npm to declared version
        run: npm install -g npm@11.6.1

      - run: npm ci

      - name: Build packages
        run: npm run build

      - name: Pack tarballs
        run: |
          mkdir -p /tmp/packs
          npm pack --workspace=packages/protocol --pack-destination /tmp/packs
          npm pack --workspace=packages/sdk --pack-destination /tmp/packs

      - name: Create test project with minimum peer deps
        run: |
          mkdir /tmp/compat-test
          cd /tmp/compat-test
          npm init -y
          # Install packed tarballs
          npm install /tmp/packs/glasstrace-protocol-*.tgz /tmp/packs/glasstrace-sdk-*.tgz
          # Install minimum supported peer dependency versions
          npm install zod@4.3.6 @opentelemetry/api@1.0.0

      - name: Verify protocol import and basic usage
        run: |
          cd /tmp/compat-test
          node --input-type=module -e "
            import { SessionIdSchema, CaptureConfigSchema, GLASSTRACE_ATTRIBUTE_NAMES } from '@glasstrace/protocol';
            // Validate a schema parse round-trip
            const id = SessionIdSchema.parse('a1b2c3d4e5f6a1b2');
            if (typeof id !== 'string') throw new Error('SessionIdSchema parse failed');
            // Verify constants are exported
            if (!GLASSTRACE_ATTRIBUTE_NAMES) throw new Error('Constants not exported');
            console.log('protocol: all imports OK');
          "

      - name: Verify SDK import and basic usage
        run: |
          cd /tmp/compat-test
          node --input-type=module -e "
            import { SdkError, readEnvVars, resolveConfig, deriveSessionId } from '@glasstrace/sdk';
            // Verify SdkError is constructable (code, message)
            const err = new SdkError('ingestion_unreachable', 'test error');
            if (!(err instanceof Error)) throw new Error('SdkError not an Error');
            // Verify env detection works without env vars set
            const env = readEnvVars();
            if (typeof env !== 'object') throw new Error('readEnvVars failed');
            console.log('sdk: all imports OK');
          "
