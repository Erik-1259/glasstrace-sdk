name: CI

on:
  push:
    branches: [main]
    # Skip CI on pure documentation / metadata changes. Source and
    # package-lock changes always trigger. The check runs at workflow
    # level — if ALL paths in the diff match one of the ignored
    # patterns, the workflow is skipped entirely.
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"

# Cancel in-progress runs when a new commit is pushed to the same ref
# (PR branch or main). Previously, a PR with N rapid pushes produced N
# concurrent full CI runs — wasteful on both minutes and queue slots.
# Using `github.head_ref || github.ref` so PR runs group by the PR
# branch (head_ref) instead of the synthetic refs/pull/<n>/merge ref,
# which does not change between commits on the same PR.
concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: corepack enable

      # --no-audit: we run `npm audit` as a dedicated step below, no
      # need for npm ci to also audit during install.
      - run: npm ci --no-audit

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Build runs before Test so the bundle-output tests (e.g. the
      # DISC-1257 shim-regression guard in `tests/unit/sdk/bundle-shim-regression.test.ts`)
      # can load the emitted `packages/sdk/dist/index.js` and
      # `packages/sdk/dist/index.cjs`. Those tests self-skip when
      # `dist/` is absent, so running Test first would silently bypass
      # them in CI.
      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      # Bundle-output regression guards. The emitted SDK JS must not contain
      # patterns that are known to break consumer bundlers:
      #
      # - DISC-1255: literal `import("@vercel/blob/client")` or
      #   `import("@vercel/otel")` calls. Those cause webpack / tsup / esbuild
      #   to resolve the specifier at build time and fail for consumers
      #   without the optional peer dependency installed. The SDK hides these
      #   specifiers behind a `Function("id", "return import(id)")`
      #   indirection, so literal `import(...)` calls must never appear in
      #   shipped JS.
      #
      # - DISC-1257: two independent tsup defaults, both of which break
      #   `next dev --webpack`:
      #     (a) the stock `esm_shims.js` header, which marks the injected
      #         import path from "path";
      #         import { fileURLToPath } from "url";
      #         pair used to synthesize `__dirname`/`__filename` in ESM
      #         output.
      #     (b) `removeNodeProtocol: true`, which rewrites SDK-source
      #         `node:fs/promises` imports to `fs/promises` before emit.
      #   Both forms produce unprefixed Node-builtin specifiers that the
      #   webpack dev bundler does not externalize. The SDK ships with
      #   `shims: false` AND `removeNodeProtocol: false` in
      #   `packages/sdk/tsup.config.ts` and must not regress on either.
      #
      # The check intentionally only scans emitted JS (`.js` / `.cjs`) —
      # source maps and `.d.ts` files legitimately reference the specifiers.
      - name: Check shipped bundle for known-bad patterns
        run: |
          set -euo pipefail
          status=0

          peer_dep_violations=$(
            grep -RhnE 'import\s*\(\s*["'\''](@vercel/blob/client|@vercel/otel)["'\'']\s*\)' \
              packages/sdk/dist \
              --include='*.js' --include='*.cjs' \
              || true
          )
          if [ -n "$peer_dep_violations" ]; then
            echo "::error::Literal import() of an optional peer dependency found in shipped bundle."
            echo "This will break webpack/tsup/esbuild builds for consumers without the peer dep installed."
            echo "Route the import through the Function()-based dynamic-import evasion helper instead. See DISC-1255."
            echo ""
            echo "Offending lines:"
            echo "$peer_dep_violations"
            status=1
          fi

          # `-F` forces fixed-string matching so the slashes and dots in the
          # marker are not reinterpreted. `--include` filters go before the
          # pattern and directory — placing them after would require a `--`
          # to end option parsing, which GNU grep would then read as
          # additional positional file paths and silently scan everything
          # (including source maps), producing spurious failures.
          shim_violations=$(
            grep -Rln --include='*.js' --include='*.cjs' \
              -F '// ../../node_modules/tsup/assets/esm_shims.js' \
              packages/sdk/dist \
              || true
          )
          if [ -n "$shim_violations" ]; then
            echo "::error::tsup ESM shim header detected in shipped bundle."
            echo "The shim injects static top-level imports of 'path' and 'url' that break next dev --webpack."
            echo "Set \`shims: false\` in packages/sdk/tsup.config.ts and replace any __dirname / __filename"
            echo "usage with fileURLToPath(import.meta.url). See DISC-1257."
            echo ""
            echo "Offending files:"
            echo "$shim_violations"
            status=1
          fi

          # DISC-1257 part two: tsup's `removeNodeProtocol: true` default
          # rewrites every SDK-source `node:fs/promises` / `node:path` /
          # etc. import to the unprefixed form, which `next dev --webpack`
          # cannot resolve. The SDK disables that default. This check
          # asserts that at least one emitted SDK bundle still contains a
          # `node:`-prefixed specifier — i.e. the override is in effect
          # and the SDK source has not been rewritten away from `node:*`.
          #
          # We intentionally check for presence rather than the absence
          # of unprefixed forms: bundled third-party deps (e.g.
          # `@opentelemetry/resources`) legitimately use unprefixed
          # `fs`/`util` and we do not want to gate on their internals.
          node_prefix_hits=$(
            grep -REl --include='*.js' --include='*.cjs' \
              -e 'from "node:' -e "from 'node:" \
              -e 'require\("node:' -e "require\\('node:" \
              packages/sdk/dist \
              || true
          )
          if [ -z "$node_prefix_hits" ]; then
            echo "::error::No \`node:\`-prefixed Node built-in imports found in shipped bundle."
            echo "tsup's \`removeNodeProtocol: true\` default has rewritten SDK-source \`node:\` specifiers"
            echo "to the unprefixed form, which breaks next dev --webpack. Set \`removeNodeProtocol: false\`"
            echo "in packages/sdk/tsup.config.ts. See DISC-1257."
            status=1
          fi

          if [ "$status" -eq 0 ]; then
            echo "No known-bad bundle patterns found in shipped SDK output."
          fi
          exit "$status"

      - name: Pack (verify publishable)
        run: |
          npm pack --dry-run --workspace=packages/protocol
          npm pack --dry-run --workspace=packages/sdk

  browser-import:
    name: Browser import check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: corepack enable

      # --no-audit: the test job (`needs: test`) already gated on npm
      # audit, so there is no reason to re-audit here.
      - run: npm ci --no-audit

      - run: npm run build

      - name: Verify SDK resolves for browser bundlers
        run: |
          cd /tmp
          mkdir browser-import-test && cd browser-import-test
          npm init -y
          npm install ${{ github.workspace }}/packages/sdk
          # Write a test entry file that imports the SDK's main entry points
          cat > entry.mjs <<'ENTRY'
          import { registerGlasstrace, withGlasstraceConfig, captureError } from "@glasstrace/sdk";
          console.log(typeof registerGlasstrace, typeof withGlasstraceConfig, typeof captureError);
          ENTRY
          # Bundle for browser to verify the SDK's module graph resolves.
          # Node.js built-ins are externalized because the SDK is a server-
          # side package — the goal is verifying the module graph resolves,
          # not eliminating all Node.js references.
          # Both prefixed (node:fs) and unprefixed (fs) forms are listed:
          # the SDK's own source uses the `node:`-prefixed form (see
          # DISC-1257) while bundled third-party dependencies inline their
          # own unprefixed `fs` / `path` / `util` imports.
          npx esbuild --bundle --platform=browser --outfile=out.js \
            --external:@opentelemetry/* \
            --external:'node:*' \
            --external:fs --external:fs/promises --external:path \
            --external:crypto --external:child_process \
            --external:util --external:zlib --external:stream \
            --external:os --external:http --external:https \
            --external:net --external:tls --external:events \
            --external:buffer --external:url --external:querystring \
            --external:async_hooks --external:module \
            entry.mjs
          echo "Browser import check passed"

  compat:
    name: Compatibility (min peer deps)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: corepack enable

      # --no-audit: the test job (`needs: test`) already gated on npm
      # audit, so there is no reason to re-audit here.
      - run: npm ci --no-audit

      - name: Build packages
        run: npm run build

      - name: Pack tarballs
        run: |
          mkdir -p /tmp/packs
          npm pack --workspace=packages/protocol --pack-destination /tmp/packs
          npm pack --workspace=packages/sdk --pack-destination /tmp/packs

      - name: Create test project with minimum peer deps
        run: |
          mkdir /tmp/compat-test
          cd /tmp/compat-test
          npm init -y
          # Install packed tarballs
          npm install /tmp/packs/glasstrace-protocol-*.tgz /tmp/packs/glasstrace-sdk-*.tgz
          # Install minimum supported peer dependency versions
          npm install zod@4.3.6 @opentelemetry/api@1.0.0

      - name: Verify protocol import and basic usage
        run: |
          cd /tmp/compat-test
          node --input-type=module -e "
            import { SessionIdSchema, CaptureConfigSchema, GLASSTRACE_ATTRIBUTE_NAMES } from '@glasstrace/protocol';
            // Validate a schema parse round-trip
            const id = SessionIdSchema.parse('a1b2c3d4e5f6a1b2');
            if (typeof id !== 'string') throw new Error('SessionIdSchema parse failed');
            // Verify constants are exported
            if (!GLASSTRACE_ATTRIBUTE_NAMES) throw new Error('Constants not exported');
            console.log('protocol: all imports OK');
          "

      - name: Verify SDK import and basic usage
        run: |
          cd /tmp/compat-test
          node --input-type=module -e "
            import { SdkError, readEnvVars, resolveConfig, deriveSessionId } from '@glasstrace/sdk';
            // Verify SdkError is constructable (code, message)
            const err = new SdkError('ingestion_unreachable', 'test error');
            if (!(err instanceof Error)) throw new Error('SdkError not an Error');
            // Verify env detection works without env vars set
            const env = readEnvVars();
            if (typeof env !== 'object') throw new Error('readEnvVars failed');
            console.log('sdk: all imports OK');
          "

  next-compat:
    name: Next.js compatibility (webpack + Turbopack)
    runs-on: ubuntu-latest
    needs: test
    # DISC-1255, DISC-1256, and DISC-1257 regression coverage: scaffold a
    # bare Next.js project, install the packed SDK tarball, apply
    # `withGlasstraceConfig` to a minimal `next.config.ts`, and exercise
    # three entry points:
    #   1. `next build` (Turbopack default in Next 16)
    #   2. `next build --webpack`
    #   3. `next dev --webpack` (live dev server + GET / smoke)
    # All three must succeed. (3) is the DISC-1257-specific guard — the
    # dev bundler path does not externalize Node built-ins, so SDK chunks
    # emitted with tsup's ESM shim fail at runtime on this path only.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: corepack enable

      - run: npm ci --no-audit

      - name: Build packages
        run: npm run build

      - name: Pack tarballs
        run: |
          mkdir -p /tmp/packs
          npm pack --workspace=packages/protocol --pack-destination /tmp/packs
          npm pack --workspace=packages/sdk --pack-destination /tmp/packs

      - name: Scaffold minimal Next.js app and install SDK
        run: |
          # Use a dedicated directory so cleanup is unambiguous even if a
          # prior run left files behind (self-hosted runners, reused /tmp).
          rm -rf /tmp/next-compat
          mkdir /tmp/next-compat
          cd /tmp/next-compat
          npm init -y
          # Mark the scaffold as an ES module so Turbopack does not reject
          # the app/*.tsx files for mixing CJS and ESM syntax. `npm init -y`
          # omits `"type"`, which defaults to CommonJS and breaks the
          # Turbopack build pipeline.
          node -e 'const fs=require("fs"); const p="package.json"; const j=JSON.parse(fs.readFileSync(p,"utf8")); j.type="module"; fs.writeFileSync(p, JSON.stringify(j, null, 2));'
          # Pin next@canary for the Next 16 canary path (DISC-1255/DISC-1256
          # both reproduced on 16.2.x-canary). React 19 is required by Next 16.
          npm install next@canary react@19 react-dom@19 typescript@5 @types/react@19 @types/node@22
          npm install /tmp/packs/glasstrace-protocol-*.tgz /tmp/packs/glasstrace-sdk-*.tgz
          # Minimum-required tsconfig (copied from the create-next-app defaults
          # that we actually use — paths, module resolution, jsx preserve).
          cat > tsconfig.json <<'TSCONFIG'
          {
            "compilerOptions": {
              "target": "ES2020",
              "lib": ["dom", "dom.iterable", "esnext"],
              "allowJs": true,
              "skipLibCheck": true,
              "strict": true,
              "noEmit": true,
              "esModuleInterop": true,
              "module": "esnext",
              "moduleResolution": "bundler",
              "resolveJsonModule": true,
              "isolatedModules": true,
              "jsx": "preserve",
              "incremental": true
            },
            "include": ["next-env.d.ts", "**/*.ts", "**/*.tsx"],
            "exclude": ["node_modules"]
          }
          TSCONFIG
          cat > next.config.ts <<'NEXTCFG'
          import type { NextConfig } from "next";
          import { withGlasstraceConfig } from "@glasstrace/sdk";

          const nextConfig: NextConfig = {
            reactStrictMode: true,
          };

          export default withGlasstraceConfig(nextConfig);
          NEXTCFG
          mkdir -p app
          cat > app/layout.tsx <<'LAYOUT'
          export default function RootLayout({ children }: { children: React.ReactNode }) {
            return (<html><body>{children}</body></html>);
          }
          LAYOUT
          cat > app/page.tsx <<'PAGE'
          export default function Page() { return <main>ok</main>; }
          PAGE
          # DISC-1257 repro path: the failure mode requires the SDK's
          # instrumentation entry to be pulled through webpack's dev
          # bundler. Without `instrumentation.ts`, Next never needs to
          # resolve `@glasstrace/sdk/dist/**/chunk-*.js`, so the shim
          # chunk never surfaces and the smoke would pass even with the
          # regression present. The `register()` hook is Next's official
          # extension point for the instrumentation graph.
          #
          # Endpoint points at a closed local port so the SDK's
          # fire-and-forget init POST fails immediately without leaving
          # pending network I/O. The apiKey is a non-secret placeholder
          # — the SDK will short-circuit to anonymous mode after the
          # init call errors out, which is fine for a compile-time
          # regression guard.
          cat > instrumentation.ts <<'INSTRUMENTATION'
          export async function register() {
            const { registerGlasstrace } = await import("@glasstrace/sdk");
            registerGlasstrace({
              apiKey: "gt_ci_smoke_placeholder",
              endpoint: "http://127.0.0.1:9",
              forceEnable: true,
            });
          }
          INSTRUMENTATION

      - name: next build (Turbopack default, DISC-1256)
        working-directory: /tmp/next-compat
        run: npx next build

      - name: next build --webpack (DISC-1255 + DISC-1256)
        working-directory: /tmp/next-compat
        run: npx next build --webpack

      # DISC-1257 regression guard: `next dev --webpack` must start without
      # `Module not found` errors for Node built-ins (`path`, `fs/promises`)
      # that tsup's ESM shim used to inject at the top of SDK chunks.
      # Unlike `next build --webpack`, the dev bundler path does not
      # externalize those built-ins, so a regression here (e.g. someone
      # flipping `shims: true` back on) is only caught by a live dev
      # server smoke. The step:
      #   1. starts `next dev --webpack` in the background, capturing logs
      #   2. waits up to ~60s for the "Ready" marker
      #   3. asserts `GET /` returns 200
      #   4. kills the child process and waits for it to exit so the CI
      #      runner does not leak an orphan dev server
      # The outer step timeout caps the entire smoke at ~90s.
      - name: next dev --webpack smoke (DISC-1257)
        working-directory: /tmp/next-compat
        timeout-minutes: 2
        run: |
          set -euo pipefail
          PORT=4700
          LOG=/tmp/next-compat/next-dev.log
          : > "$LOG"

          # Start the dev server in the background. `setsid` puts it in a
          # new process group so we can kill the whole tree cleanly on exit.
          setsid npx next dev --webpack --port "$PORT" > "$LOG" 2>&1 &
          DEV_PID=$!
          DEV_PGID=$(ps -o pgid= "$DEV_PID" | tr -d ' ')

          cleanup() {
            echo "Stopping next dev (pid=$DEV_PID pgid=$DEV_PGID)..."
            # SIGTERM the whole process group first, escalate to SIGKILL
            # if it does not exit within 10s.
            kill -TERM "-$DEV_PGID" 2>/dev/null || true
            for _ in $(seq 1 10); do
              if ! kill -0 "$DEV_PID" 2>/dev/null; then
                break
              fi
              sleep 1
            done
            if kill -0 "$DEV_PID" 2>/dev/null; then
              echo "next dev did not exit on SIGTERM; sending SIGKILL"
              kill -KILL "-$DEV_PGID" 2>/dev/null || true
            fi
            # Wait so the CI runner does not leave a zombie child.
            wait "$DEV_PID" 2>/dev/null || true
            echo "--- next dev log (tail) ---"
            tail -n 200 "$LOG" || true
          }
          trap cleanup EXIT

          # Wait for the "Ready" marker or a fatal `Module not found` error
          # — whichever appears first. 60s should be ample on a GitHub
          # runner; we exit early if the server reports readiness sooner.
          echo "Waiting for next dev ready marker..."
          for i in $(seq 1 60); do
            if grep -q "Module not found" "$LOG"; then
              echo "::error::next dev --webpack reported Module not found. DISC-1257 regression."
              exit 1
            fi
            if grep -qE "Ready in [0-9]+" "$LOG"; then
              echo "next dev ready after ~${i}s"
              break
            fi
            if ! kill -0 "$DEV_PID" 2>/dev/null; then
              echo "::error::next dev exited before reporting Ready."
              exit 1
            fi
            sleep 1
          done

          if ! grep -qE "Ready in [0-9]+" "$LOG"; then
            echo "::error::next dev --webpack did not become Ready within 60s."
            exit 1
          fi

          # Hit the root route. First request triggers compilation, which
          # under webpack-dev can take a few seconds; retry briefly so a
          # slow compile doesn't flake the check.
          echo "Requesting GET / ..."
          status=""
          for _ in $(seq 1 20); do
            status=$(curl -s -o /tmp/next-compat/response.html -w "%{http_code}" "http://127.0.0.1:$PORT/" || echo "000")
            if [ "$status" = "200" ]; then
              break
            fi
            sleep 1
          done

          if [ "$status" != "200" ]; then
            echo "::error::GET / returned $status (expected 200). DISC-1257 regression."
            exit 1
          fi

          # Re-scan the log one last time for Module not found that may have
          # surfaced only after the first request triggered a recompile.
          if grep -q "Module not found" "$LOG"; then
            echo "::error::next dev --webpack reported Module not found after serving request. DISC-1257 regression."
            exit 1
          fi

          echo "next dev --webpack smoke passed: Ready, GET / = 200, no Module not found."

      - name: Cleanup scaffold
        if: always()
        run: rm -rf /tmp/next-compat /tmp/packs
