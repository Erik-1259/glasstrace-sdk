name: CI

on:
  push:
    branches: [main]
    # Skip CI on pure documentation / metadata changes. Source and
    # package-lock changes always trigger. The check runs at workflow
    # level — if ALL paths in the diff match one of the ignored
    # patterns, the workflow is skipped entirely.
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"

# Cancel in-progress runs when a new commit is pushed to the same ref
# (PR branch or main). Previously, a PR with N rapid pushes produced N
# concurrent full CI runs — wasteful on both minutes and queue slots.
# Using `github.head_ref || github.ref` so PR runs group by the PR
# branch (head_ref) instead of the synthetic refs/pull/<n>/merge ref,
# which does not change between commits on the same PR.
concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: corepack enable

      # --no-audit: we run `npm audit` as a dedicated step below, no
      # need for npm ci to also audit during install.
      - run: npm ci --no-audit

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      # DISC-1255 regression guard: ensure the emitted SDK bundle does not
      # contain any literal `import("@vercel/blob/client")` or
      # `import("@vercel/otel")` calls. Those literals cause webpack / tsup /
      # esbuild to resolve the specifier at build time and fail for consumers
      # without the optional peer dependency installed. The SDK hides these
      # specifiers behind a `Function("id", "return import(id)")` indirection
      # so they must never appear as literal `import(...)` calls in shipped JS.
      # The check intentionally only scans emitted JS (`.js` / `.cjs`) — source
      # maps and `.d.ts` files legitimately reference the specifier.
      - name: Check for bundled optional peer-dep specifiers
        run: |
          set -euo pipefail
          violations=$(
            grep -RhnE 'import\s*\(\s*["'\''](@vercel/blob/client|@vercel/otel)["'\'']\s*\)' \
              packages/sdk/dist \
              --include='*.js' --include='*.cjs' \
              || true
          )
          if [ -n "$violations" ]; then
            echo "::error::Literal import() of an optional peer dependency found in shipped bundle."
            echo "This will break webpack/tsup/esbuild builds for consumers without the peer dep installed."
            echo "Route the import through the Function()-based dynamic-import evasion helper instead. See DISC-1255."
            echo ""
            echo "Offending lines:"
            echo "$violations"
            exit 1
          fi
          echo "No literal optional-peer-dep import() calls found in shipped bundle."

      - name: Pack (verify publishable)
        run: |
          npm pack --dry-run --workspace=packages/protocol
          npm pack --dry-run --workspace=packages/sdk

  browser-import:
    name: Browser import check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: corepack enable

      # --no-audit: the test job (`needs: test`) already gated on npm
      # audit, so there is no reason to re-audit here.
      - run: npm ci --no-audit

      - run: npm run build

      - name: Verify SDK resolves for browser bundlers
        run: |
          cd /tmp
          mkdir browser-import-test && cd browser-import-test
          npm init -y
          npm install ${{ github.workspace }}/packages/sdk
          # Write a test entry file that imports the SDK's main entry points
          cat > entry.mjs <<'ENTRY'
          import { registerGlasstrace, withGlasstraceConfig, captureError } from "@glasstrace/sdk";
          console.log(typeof registerGlasstrace, typeof withGlasstraceConfig, typeof captureError);
          ENTRY
          # Bundle for browser to verify the SDK's module graph resolves.
          # Node.js built-ins are externalized because the SDK is a server-
          # side package — the goal is verifying the module graph resolves,
          # not eliminating all Node.js references.
          # Both prefixed (node:fs) and unprefixed (fs) forms are needed
          # because tsup strips the node: prefix during bundling.
          npx esbuild --bundle --platform=browser --outfile=out.js \
            --external:@opentelemetry/* \
            --external:'node:*' \
            --external:fs --external:fs/promises --external:path \
            --external:crypto --external:child_process \
            --external:util --external:zlib --external:stream \
            --external:os --external:http --external:https \
            --external:net --external:tls --external:events \
            --external:buffer --external:url --external:querystring \
            --external:async_hooks --external:module \
            entry.mjs
          echo "Browser import check passed"

  compat:
    name: Compatibility (min peer deps)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: corepack enable

      # --no-audit: the test job (`needs: test`) already gated on npm
      # audit, so there is no reason to re-audit here.
      - run: npm ci --no-audit

      - name: Build packages
        run: npm run build

      - name: Pack tarballs
        run: |
          mkdir -p /tmp/packs
          npm pack --workspace=packages/protocol --pack-destination /tmp/packs
          npm pack --workspace=packages/sdk --pack-destination /tmp/packs

      - name: Create test project with minimum peer deps
        run: |
          mkdir /tmp/compat-test
          cd /tmp/compat-test
          npm init -y
          # Install packed tarballs
          npm install /tmp/packs/glasstrace-protocol-*.tgz /tmp/packs/glasstrace-sdk-*.tgz
          # Install minimum supported peer dependency versions
          npm install zod@4.3.6 @opentelemetry/api@1.0.0

      - name: Verify protocol import and basic usage
        run: |
          cd /tmp/compat-test
          node --input-type=module -e "
            import { SessionIdSchema, CaptureConfigSchema, GLASSTRACE_ATTRIBUTE_NAMES } from '@glasstrace/protocol';
            // Validate a schema parse round-trip
            const id = SessionIdSchema.parse('a1b2c3d4e5f6a1b2');
            if (typeof id !== 'string') throw new Error('SessionIdSchema parse failed');
            // Verify constants are exported
            if (!GLASSTRACE_ATTRIBUTE_NAMES) throw new Error('Constants not exported');
            console.log('protocol: all imports OK');
          "

      - name: Verify SDK import and basic usage
        run: |
          cd /tmp/compat-test
          node --input-type=module -e "
            import { SdkError, readEnvVars, resolveConfig, deriveSessionId } from '@glasstrace/sdk';
            // Verify SdkError is constructable (code, message)
            const err = new SdkError('ingestion_unreachable', 'test error');
            if (!(err instanceof Error)) throw new Error('SdkError not an Error');
            // Verify env detection works without env vars set
            const env = readEnvVars();
            if (typeof env !== 'object') throw new Error('readEnvVars failed');
            console.log('sdk: all imports OK');
          "

  next-compat:
    name: Next.js compatibility (webpack + Turbopack)
    runs-on: ubuntu-latest
    needs: test
    # DISC-1255 and DISC-1256 regression coverage: scaffold a bare Next.js
    # project, install the packed SDK tarball, apply `withGlasstraceConfig`
    # to a minimal `next.config.ts`, and run `next build` in both the
    # Turbopack-default path and the `--webpack` path. Both must exit 0.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: corepack enable

      - run: npm ci --no-audit

      - name: Build packages
        run: npm run build

      - name: Pack tarballs
        run: |
          mkdir -p /tmp/packs
          npm pack --workspace=packages/protocol --pack-destination /tmp/packs
          npm pack --workspace=packages/sdk --pack-destination /tmp/packs

      - name: Scaffold minimal Next.js app and install SDK
        run: |
          # Use a dedicated directory so cleanup is unambiguous even if a
          # prior run left files behind (self-hosted runners, reused /tmp).
          rm -rf /tmp/next-compat
          mkdir /tmp/next-compat
          cd /tmp/next-compat
          npm init -y
          # Mark the scaffold as an ES module so Turbopack does not reject
          # the app/*.tsx files for mixing CJS and ESM syntax. `npm init -y`
          # omits `"type"`, which defaults to CommonJS and breaks the
          # Turbopack build pipeline.
          node -e 'const fs=require("fs"); const p="package.json"; const j=JSON.parse(fs.readFileSync(p,"utf8")); j.type="module"; fs.writeFileSync(p, JSON.stringify(j, null, 2));'
          # Pin next@canary for the Next 16 canary path (DISC-1255/DISC-1256
          # both reproduced on 16.2.x-canary). React 19 is required by Next 16.
          npm install next@canary react@19 react-dom@19 typescript@5 @types/react@19 @types/node@22
          npm install /tmp/packs/glasstrace-protocol-*.tgz /tmp/packs/glasstrace-sdk-*.tgz
          # Minimum-required tsconfig (copied from the create-next-app defaults
          # that we actually use — paths, module resolution, jsx preserve).
          cat > tsconfig.json <<'TSCONFIG'
          {
            "compilerOptions": {
              "target": "ES2020",
              "lib": ["dom", "dom.iterable", "esnext"],
              "allowJs": true,
              "skipLibCheck": true,
              "strict": true,
              "noEmit": true,
              "esModuleInterop": true,
              "module": "esnext",
              "moduleResolution": "bundler",
              "resolveJsonModule": true,
              "isolatedModules": true,
              "jsx": "preserve",
              "incremental": true
            },
            "include": ["next-env.d.ts", "**/*.ts", "**/*.tsx"],
            "exclude": ["node_modules"]
          }
          TSCONFIG
          cat > next.config.ts <<'NEXTCFG'
          import type { NextConfig } from "next";
          import { withGlasstraceConfig } from "@glasstrace/sdk";

          const nextConfig: NextConfig = {
            reactStrictMode: true,
          };

          export default withGlasstraceConfig(nextConfig);
          NEXTCFG
          mkdir -p app
          cat > app/layout.tsx <<'LAYOUT'
          export default function RootLayout({ children }: { children: React.ReactNode }) {
            return (<html><body>{children}</body></html>);
          }
          LAYOUT
          cat > app/page.tsx <<'PAGE'
          export default function Page() { return <main>ok</main>; }
          PAGE

      - name: next build (Turbopack default, DISC-1256)
        working-directory: /tmp/next-compat
        run: npx next build

      - name: next build --webpack (DISC-1255 + DISC-1256)
        working-directory: /tmp/next-compat
        run: npx next build --webpack

      - name: Cleanup scaffold
        if: always()
        run: rm -rf /tmp/next-compat /tmp/packs
