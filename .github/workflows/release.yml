name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: "Release mode"
        required: true
        type: choice
        options:
          - canary
          - stable
        default: canary

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  # On push to main: only create/update the Version Packages PR.
  # Never auto-publish — all publishing is manual via workflow_dispatch.
  version:
    name: Version Packages PR
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: corepack enable

      - run: npm ci

      - name: Create or update Version Packages PR
        uses: changesets/action@v1
        with:
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Manual dispatch: publish canary or stable to npm.
  publish:
    name: Publish (${{ inputs.mode }})
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write  # OIDC for npm trusted publishing
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          # Pin to avoid Node 22.22.2 which ships with broken npm
          # (missing promise-retry). See DISC-443.
          node-version: 22.15
          cache: npm

      # npm 11.5.1+ required for OIDC trusted publishing (tokenless).
      # Node 22 bundles npm 10.x which does not support it.
      # Corepack's npm support is unreliable in GitHub Actions — it
      # does not always override the bundled npm version. Use explicit
      # global install instead.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.6.1

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      # Canary: snapshot version + publish with @canary tag
      - name: Snapshot version
        if: ${{ inputs.mode == 'canary' }}
        run: npx changeset version --snapshot canary

      - name: Publish canary
        if: ${{ inputs.mode == 'canary' }}
        run: npx changeset publish --tag canary

      # Stable: publish current versions (after Version Packages PR was merged)
      # Only allowed from main branch to prevent accidental releases
      - name: Publish stable
        if: ${{ inputs.mode == 'stable' && github.ref == 'refs/heads/main' }}
        run: npx changeset publish
