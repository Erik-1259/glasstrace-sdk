version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      # Minor and patch updates are safe to group — they should not
      # contain breaking changes per semver.
      production-minor:
        dependency-type: production
        update-types: ["minor", "patch"]
      development-minor:
        dependency-type: development
        update-types: ["minor", "patch"]
      # Major version bumps get individual PRs so each can be
      # reviewed and migrated independently. Grouping majors
      # caused cascading failures (TS6 + Zod4 + Vitest4 in one PR).
    # Major bumps are not grouped — Dependabot creates one PR per
    # major bump by default when they're excluded from all groups.

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
