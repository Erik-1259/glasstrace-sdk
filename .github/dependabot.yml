version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Minor and patch updates are grouped together. These are
      # usually non-breaking for stable (>=1.0) dependencies.
      # Review 0.x minor bumps carefully — semver treats those as
      # potentially breaking.
      production-minor-patch:
        dependency-type: production
        update-types: ["minor", "patch"]
      development-minor-patch:
        dependency-type: development
        update-types: ["minor", "patch"]
      # Major version bumps get individual PRs so each can be
      # reviewed and migrated independently. Grouping majors
      # caused cascading failures (TS6 + Zod4 + Vitest4 in one PR).
      # Major bumps are not grouped — Dependabot creates one PR per
      # major bump by default when excluded from all groups.
    ignore:
      # Pin TypeScript to the 6.0.x line. typescript-eslint (the repo's linter)
      # caps its `typescript` peer at `<6.1.0`, so ANY release >= 6.1.0 — a
      # 6.1.x minor as well as a 7.x major — fails to resolve and `npm ci` dies
      # with ERESOLVE, taking the build + lockfile-regeneration jobs down. Safe
      # 6.0.x patches still flow. Raise this bound (or drop the entry) once
      # typescript-eslint widens its peer cap, then bump TypeScript as its own
      # migration.
      - dependency-name: "typescript"
        versions: [">=6.1.0"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
